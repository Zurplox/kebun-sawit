name: Citra Sawit Harian

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC = 08:00 WIB/SGT setiap hari
  workflow_dispatch:

permissions:
  contents: write

jobs:
  citra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow

      - name: Generate citra sawit
        env:
          SH_CLIENT_ID: ${{ secrets.SH_CLIENT_ID }}
          SH_CLIENT_SECRET: ${{ secrets.SH_CLIENT_SECRET }}
          PLOT_LAT: "0.82429"
          PLOT_LON: "101.96640"
          BOX_HALF_M: "750"
        run: python sawit_satelit.py

      - name: Commit and push hasil
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update citra sawit harian" || echo "Tidak ada perubahan"
          git push
