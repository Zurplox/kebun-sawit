name: Citra Sawit Harian

on:
  schedule:
    # Setiap hari 00:00 UTC = 08:00 WIB/Singapore
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # tombol jalankan manual

permissions:
  contents: write

jobs:
  ambil-citra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Jalankan skrip
        env:
          SH_CLIENT_ID: ${{ secrets.SH_CLIENT_ID }}
          SH_CLIENT_SECRET: ${{ secrets.SH_CLIENT_SECRET }}
          # Ganti lokasi plot di sini jika perlu:
          PLOT_LAT: "0.81500"
          PLOT_LON: "101.96617"
          BOX_HALF_M: "600"
        run: python sawit_satelit.py

      - name: Simpan citra ke repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Citra sawit harian $(date -u +%Y-%m-%d)" || echo "Tidak ada perubahan"
          git push
