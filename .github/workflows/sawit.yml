name: Citra Sawit Mingguan

on:
  schedule:
    # Setiap Senin 00:00 UTC = Senin 08:00 WIB/Singapore
    - cron: "0 0 * * 1"
  workflow_dispatch: {}   # tombol jalankan manual

permissions:
  contents: write

jobs:
  ambil-citra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Jalankan skrip
        env:
          SH_CLIENT_ID: ${{ secrets.SH_CLIENT_ID }}
          SH_CLIENT_SECRET: ${{ secrets.SH_CLIENT_SECRET }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          # Ganti lokasi plot di sini jika perlu:
          PLOT_LAT: "0.81500"
          PLOT_LON: "101.96617"
          BOX_HALF_M: "600"
        run: python sawit_satelit.py

      - name: Simpan citra ke repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add citra/
          git commit -m "Citra sawit mingguan $(date -u +%Y-%m-%d)" || echo "Tidak ada perubahan"
          git push
